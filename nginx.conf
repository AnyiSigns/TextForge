upstream backend_api {
    server 127.0.0.1:8000;
}

upstream frontend_next {
    server 127.0.0.1:3000;
}

server {
    listen 80;
    server_name your-domain.com;  # 替换为你的域名或 IP

    # 前端 Next.js（包含 SSR/SSG）
    location / {
        proxy_pass http://frontend_next;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
    }

    # 后端 API
    location /api/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 10M;
    }

    # 静态头像（不经过 FastAPI）
    location /static/ {
        alias C:/Users/Anyi/Documents/PycharmProjects/TextForge/text_forge_backend/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff";
        # Windows 路径用反斜杠，Nginx 也接受正斜杠
    }

    # 日志（可选）
    access_log C:/nginx/logs/text-forge-access.log;
    error_log C:/nginx/logs/text-forge-error.log;
}
